name: Build & Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/purevision-backend ./backend

      - name: Build frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/purevision-frontend ./frontend

      - name: Push backend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/purevision-backend

      - name: Push frontend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/purevision-frontend